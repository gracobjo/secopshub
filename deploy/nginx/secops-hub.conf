# SecOps Hub — Nginx reverse proxy (producción)
#
# Instalación:
#   1. Copiar a /etc/nginx/sites-available/secops-hub
#   2. Ajustar server_name, rutas y certificados TLS
#   3. ln -s /etc/nginx/sites-available/secops-hub /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx
#
# Requisitos previos:
#   - frontend/dist compilado (deploy/scripts/build-production.sh)
#   - Gunicorn escuchando en 127.0.0.1:5000 (deploy/systemd/secops-hub.service)

# Rate limiting webhook SIEM (recomendado Fase 5; incluido aquí por defecto)
limit_req_zone $binary_remote_addr zone=secops_webhook:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=secops_api:10m rate=120r/m;

upstream secops_backend {
    server 127.0.0.1:5000;
    keepalive 16;
}

# Redirigir HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name secops.empresa.local;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name secops.empresa.local;

    # --- TLS: Let's Encrypt (certbot) o CA interna ---
    ssl_certificate     /etc/ssl/certs/secops-hub.crt;
    ssl_certificate_key /etc/ssl/private/secops-hub.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Ruta de instalación (ajustar)
    root /opt/secops-hub/frontend/dist;
    index index.html;

    # Cabeceras de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10m;

    # Webhook SIEM — rate limit más estricto
    location /api/webhooks/ {
        limit_req zone=secops_webhook burst=10 nodelay;

        proxy_pass http://secops_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API REST → Gunicorn (solo localhost, no expuesto directamente)
    location /api/ {
        limit_req zone=secops_api burst=40 nodelay;

        proxy_pass http://secops_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA React — archivos estáticos + fallback index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets con hash (Vite)
    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    access_log /var/log/nginx/secops-hub.access.log;
    error_log  /var/log/nginx/secops-hub.error.log warn;
}
