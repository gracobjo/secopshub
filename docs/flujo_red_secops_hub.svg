<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Flujo de red SecOps Hub</title>
  <desc id="desc">Diagrama de comunicaciones dentro de la red corporativa: SIEM, analistas, SecOps Hub, EDR y firewall.</desc>

  <defs>
    <linearGradient id="hubGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
    <linearGradient id="netGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrowRose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="920" height="560" fill="#020617"/>

  <!-- Perimetro red corporativa -->
  <rect x="30" y="30" width="860" height="500" rx="18" fill="url(#netGrad)" stroke="#334155" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="460" y="58" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">RED CORPORATIVA (sin exposición directa a Internet)</text>

  <!-- Internet bloqueada -->
  <rect x="760" y="42" width="115" height="36" rx="8" fill="#450a0a" stroke="#991b1b" stroke-width="1.5"/>
  <text x="817" y="64" text-anchor="middle" fill="#fca5a5" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600">INTERNET</text>
  <text x="817" y="78" text-anchor="middle" fill="#f87171" font-family="Segoe UI, Arial, sans-serif" font-size="9">Acceso denegado</text>
  <line x1="755" y1="60" x2="720" y2="60" stroke="#991b1b" stroke-width="2"/>
  <line x1="720" y1="55" x2="720" y2="65" stroke="#991b1b" stroke-width="2"/>

  <!-- VLAN Analistas -->
  <rect x="55" y="400" width="220" height="105" rx="12" fill="#172554" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="165" y="425" text-anchor="middle" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">VLAN ANALISTAS / VPN</text>

  <!-- Analistas -->
  <rect x="85" y="445" width="160" height="48" rx="10" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="165" y="465" text-anchor="middle" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Analistas SOC</text>
  <text x="165" y="482" text-anchor="middle" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="10">Navegador · React :5173 / :443</text>

  <!-- SIEM -->
  <rect x="55" y="95" width="200" height="90" rx="12" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
  <text x="155" y="125" text-anchor="middle" fill="#c7d2fe" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">SIEM</text>
  <text x="155" y="145" text-anchor="middle" fill="#a5b4fc" font-family="Segoe UI, Arial, sans-serif" font-size="10">Splunk · QRadar · Sentinel</text>
  <text x="155" y="162" text-anchor="middle" fill="#818cf8" font-family="Segoe UI, Arial, sans-serif" font-size="9">VLAN SOC / DMZ interna</text>

  <!-- SecOps Hub central -->
  <rect x="330" y="210" width="260" height="120" rx="16" fill="url(#hubGrad)" stroke="#34d399" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="460" y="248" text-anchor="middle" fill="#ecfdf5" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">SecOps Hub</text>
  <text x="460" y="270" text-anchor="middle" fill="#a7f3d0" font-family="Segoe UI, Arial, sans-serif" font-size="11">Flask API :5000 · JWT · SQLite/PostgreSQL</text>
  <text x="460" y="290" text-anchor="middle" fill="#6ee7b7" font-family="Segoe UI, Arial, sans-serif" font-size="10">Consola central SOC / DFIR</text>
  <rect x="370" y="302" width="180" height="18" rx="9" fill="#065f46"/>
  <text x="460" y="315" text-anchor="middle" fill="#d1fae5" font-family="Segoe UI, Arial, sans-serif" font-size="9">Punto central · No expuesto a Internet</text>

  <!-- EDR -->
  <rect x="655" y="95" width="200" height="90" rx="12" fill="#3b0764" stroke="#c084fc" stroke-width="1.5"/>
  <text x="755" y="125" text-anchor="middle" fill="#e9d5ff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">EDR</text>
  <text x="755" y="145" text-anchor="middle" fill="#d8b4fe" font-family="Segoe UI, Arial, sans-serif" font-size="10">Defender · CrowdStrike · SentinelOne</text>
  <text x="755" y="162" text-anchor="middle" fill="#a855f7" font-family="Segoe UI, Arial, sans-serif" font-size="9">Endpoints · Servidores</text>

  <!-- Firewall -->
  <rect x="655" y="400" width="200" height="90" rx="12" fill="#431407" stroke="#fb923c" stroke-width="1.5"/>
  <text x="755" y="430" text-anchor="middle" fill="#ffedd5" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Firewall</text>
  <text x="755" y="450" text-anchor="middle" fill="#fdba74" font-family="Segoe UI, Arial, sans-serif" font-size="10">Palo Alto · pfSense · OPNsense</text>
  <text x="755" y="467" text-anchor="middle" fill="#f97316" font-family="Segoe UI, Arial, sans-serif" font-size="9">Perímetro · NGFW</text>

  <!-- Flecha 1: SIEM -> SecOps Hub -->
  <path d="M 255 140 L 330 250" fill="none" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="248" y="168" width="118" height="52" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="307" y="186" text-anchor="middle" fill="#c7d2fe" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600">` Webhook</text>
  <text x="307" y="200" text-anchor="middle" fill="#a5b4fc" font-family="Segoe UI, Arial, sans-serif" font-size="9">POST /api/webhooks/alert</text>
  <text x="307" y="213" text-anchor="middle" fill="#818cf8" font-family="Segoe UI, Arial, sans-serif" font-size="9">X-API-Key</text>

  <!-- Flecha 2: Analistas <-> SecOps Hub -->
  <path d="M 245 469 L 330 310" fill="none" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <path d="M 330 330 L 245 489" fill="none" stroke="#34d399" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <rect x="248" y="358" width="130" height="58" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="1"/>
  <text x="313" y="376" text-anchor="middle" fill="#bfdbfe" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600">a Consola ” API</text>
  <text x="313" y="390" text-anchor="middle" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="9">HTTPS · JWT Bearer</text>
  <text x="313" y="403" text-anchor="middle" fill="#60a5fa" font-family="Segoe UI, Arial, sans-serif" font-size="9">VLAN analistas / VPN</text>

  <!-- Flecha 3: SecOps Hub -> EDR -->
  <path d="M 590 240 L 655 140" fill="none" stroke="#c084fc" stroke-width="2.5" marker-end="url(#arrowRose)"/>
  <rect x="592" y="168" width="120" height="52" rx="8" fill="#3b0764" stroke="#a855f7" stroke-width="1"/>
  <text x="652" y="186" text-anchor="middle" fill="#e9d5ff" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600">b Playbooks ’ EDR</text>
  <text x="652" y="200" text-anchor="middle" fill="#d8b4fe" font-family="Segoe UI, Arial, sans-serif" font-size="9">POST /api/playbooks/run</text>
  <text x="652" y="213" text-anchor="middle" fill="#a855f7" font-family="Segoe UI, Arial, sans-serif" font-size="9">Aislar host (simulado*)</text>

  <!-- Flecha 4: SecOps Hub -> Firewall -->
  <path d="M 590 300 L 655 430" fill="none" stroke="#fb923c" stroke-width="2.5" marker-end="url(#arrowAmber)"/>
  <rect x="592" y="340" width="120" height="52" rx="8" fill="#431407" stroke="#ea580c" stroke-width="1"/>
  <text x="652" y="358" text-anchor="middle" fill="#ffedd5" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="600">c Playbooks ’ FW</text>
  <text x="652" y="372" text-anchor="middle" fill="#fdba74" font-family="Segoe UI, Arial, sans-serif" font-size="9">Bloqueo IP / deny list</text>
  <text x="652" y="385" text-anchor="middle" fill="#f97316" font-family="Segoe UI, Arial, sans-serif" font-size="9">API firewall (simulado*)</text>

  <!-- Leyenda -->
  <rect x="55" y="230" width="210" height="130" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="160" y="252" text-anchor="middle" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">Cuatro direcciones</text>
  <circle cx="75" cy="272" r="5" fill="#818cf8"/>
  <text x="88" y="276" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="10">SIEM ’ Hub (ingesta alertas)</text>
  <circle cx="75" cy="294" r="5" fill="#60a5fa"/>
  <text x="88" y="298" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="10">Analistas ” Hub (consola JWT)</text>
  <circle cx="75" cy="316" r="5" fill="#c084fc"/>
  <text x="88" y="320" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="10">Hub ’ EDR (contención host)</text>
  <circle cx="75" cy="338" r="5" fill="#fb923c"/>
  <text x="88" y="342" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="10">Hub ’ Firewall (bloqueo IP)</text>

  <!-- Nota -->
  <text x="460" y="530" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="10">* Playbooks simulados en demo · En producción: APIs reales Defender, CrowdStrike, Palo Alto, pfSense</text>
  <text x="460" y="546" text-anchor="middle" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="9">SecOps Hub · flujo_red_secops_hub.svg</text>
</svg>
