services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: secops_hub
      POSTGRES_USER: secops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secops_change_me}
    volumes:
      - secops_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secops -d secops_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      BEHIND_PROXY: "true"
      ENABLE_SEED: ${ENABLE_SEED:-false}
      DATABASE_URL: postgresql+psycopg://secops:${POSTGRES_PASSWORD:-secops_change_me}@db:5432/secops_hub
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY}
      WEBHOOK_API_KEY: ${WEBHOOK_API_KEY:?set WEBHOOK_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@secops.local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:?set BOOTSTRAP_ADMIN_PASSWORD}
      LOG_JSON: "true"
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.1.0
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  secops_pg:
  grafana_data:
